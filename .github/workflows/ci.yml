name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r web/api/requirements.txt
          pip install black==23.3.0 isort==5.12.0 flake8==6.0.0 mypy==1.2.0 types-requests bandit pytest pytest-mock
          pip install boto3 prometheus_client apscheduler

      - name: black
        run: black --check .

      - name: isort
        run: isort --check-only .

      - name: flake8
        run: flake8 .

      - name: mypy
        run: mypy src --ignore-missing-imports || true

      - name: bandit (medium+ severity)
        run: bandit -r src/ web/api/ -ll --quiet

      - name: pytest
        run: pytest -q
        env:
          DATABASE_URL: "sqlite:///:memory:"
          JWT_SECRET: "test-secret-key-at-least-32-bytes!!"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web/frontend

      - name: Frontend tests (Vitest)
        run: npm test
        working-directory: web/frontend

  deploy-api:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl --silent --show-error --fail-with-body \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  security:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Audit Python dependencies
        run: |
          pip install pip-audit -q
          pip install -r web/api/requirements.txt -q
          pip-audit --desc on
