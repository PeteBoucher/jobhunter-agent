name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r web/api/requirements.txt
          pip install black==23.3.0 isort==5.12.0 flake8==6.0.0 mypy==1.2.0 types-requests bandit pytest

      - name: black
        run: black --check .

      - name: isort
        run: isort --check-only .

      - name: flake8
        run: flake8 .

      - name: mypy
        run: mypy src --ignore-missing-imports || true

      - name: bandit (medium+ severity)
        run: bandit -r src/ web/api/ -ll --quiet

      - name: pytest
        run: pytest web/api/tests/ -q
        env:
          DATABASE_URL: "sqlite:///:memory:"
          JWT_SECRET: "test-secret-for-ci-only-not-real"

  security:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Audit Python dependencies
        run: |
          pip install pip-audit -q
          pip install -r requirements.txt -q
          pip-audit --desc on
